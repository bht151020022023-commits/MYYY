<!DOCTYPE html>
<html lang="vi">
<meta charset="UTF-8">
<title>Private Button</title>

<body style="font-family:sans-serif;text-align:center;margin-top:40px">

<h2>Đăng nhập</h2>

<div id="loginBox">
  <input id="email" placeholder="Email"><br><br>
  <input id="pass" type="password" placeholder="Password"><br><br>
  <button id="login">Đăng nhập</button>
</div>

<div id="appBox" style="display:none;margin-top:30px">
  <h3>Xin chào chủ nhân 👑</h3>
  <button id="btn" style="background:red;color:#fff;padding:15px 30px;border:0;border-radius:8px;font-size:18px">
  NHẤN NÚT
  </button>

  <p>Tổng số lần: <b id="count">0</b></p>
  <div id="log"></div>
</div>

<p id="msg"></p>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{
getAuth,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut
}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import{
getFirestore,
collection,
addDoc,
onSnapshot,
query,
orderBy
}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* 🔴 CONFIG CỦA BẠN */
const firebaseConfig={
  apiKey:"AIzaSyA3zv14xu7Dr4E5Th_C8nFfEQoph4jrxfi",
  authDomain:"ccc1-fc481.firebaseapp.com",
  projectId:"ccc1-fc481",
  storageBucket:"ccc1-fc481.firebasestorage.app",
  messagingSenderId:"39799731758",
  appId:"1:39799731758:web:c122d39770a67b21bb91bf"
};

const OWNER="15102002@gmail.com";

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);
const col=collection(db,"press_log");

/* LOGIN */
login.onclick=()=>{
  signInWithEmailAndPassword(auth,email.value,pass.value)
  .catch(()=>msg.innerText="Sai tài khoản hoặc mật khẩu");
};

/* CHECK USER */
onAuthStateChanged(auth,u=>{
  if(!u){
    loginBox.style.display="block";
    appBox.style.display="none";
    return;
  }

  if(u.email!==OWNER){
    signOut(auth);
    msg.innerText="Không có quyền truy cập";
    return;
  }

  loginBox.style.display="none";
  appBox.style.display="block";
  msg.innerText="Đăng nhập thành công";
});

/* BUTTON SAVE FIRESTORE */
btn.onclick=()=>addDoc(col,{time:new Date().toLocaleString()});

/* LOAD REALTIME */
onSnapshot(query(col,orderBy("time","desc")),s=>{
  count.innerText=s.size;
  log.innerHTML=s.docs.map(d=>d.data().time).join("<br>");
});
</script>

</body>
</html>
